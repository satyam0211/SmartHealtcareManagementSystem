version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ship-postgres
    restart: always
    environment:
      POSTGRES_DB: ship_db
      POSTGRES_USER: ship_admin
      POSTGRES_PASSWORD: ship_secure_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2023-11-01T18-37-25Z
    container_name: ship-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secure_password
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  vault:
    image: hashicorp/vault:1.15.2
    container_name: ship-vault
    restart: always
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "ship_vault_root_token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev

volumes:
  pgdata:
  miniodata:

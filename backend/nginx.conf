user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Rate Limiting Configuration
    # Limits requests per IP to 100 requests per second
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name ship.local;

        # TLS 1.3 ONLY Enforcement (per Security_Requirements.md Section 4)
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;

        # SSL Certificates (Self-signed or private CA certs for local development/on-premise deployment)
        ssl_certificate /etc/nginx/certs/ship.crt;
        ssl_certificate_key /etc/nginx/certs/ship.key;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; sandbox;" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Root API reverse proxy routing
        location /api/ {
            # Enforce API rate limits with burst allowance of 20 requests
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Block direct access to static file directories or root web folder
        location / {
            return 403;
        }
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
